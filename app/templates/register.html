{% extends "base.html" %}

{% block content %}

<div class="card" style="
max-width:450px;
margin:auto;
margin-top:80px;
padding:35px;
">

<h2 style="margin-bottom:25px;">Register</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required
style="
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:none;
"
>

<input
type="email"
name="email"
placeholder="Email"
required
style="
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:none;
"
>

<input
type="password"
name="password"
placeholder="Password"
required
style="
width:100%;
padding:12px;
margin-bottom:20px;
border-radius:6px;
border:none;
"
>

<button
class="btn btn-success"
style="width:100%; padding:12px;"
>
Create Account
</button>

</form>

<div style="margin-top:20px; text-align:center;">

<p style="margin-bottom:10px; opacity:0.8;">
Already have an account?
</p>

<a href="/login"
class="btn"
style="
padding:8px 16px;
background:#6c757d;
border-radius:6px;
font-size:14px;
text-decoration:none;
">
Login
</a>

</div>

{% endblock %}
