<!DOCTYPE html>
<html>
<head>
<title>DevOps Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
margin: 0;
font-family: 'Inter', sans-serif;
background: linear-gradient(135deg, #0f172a, #1e293b);
color: white;
}

/* NAVBAR */

.navbar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 40px;
background: rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
border-bottom: 1px solid rgba(255,255,255,0.1);
}

.nav-title {
font-weight: 600;
font-size: 18px;
}

.nav-links a {
margin-left: 15px;
text-decoration: none;
color: white;
font-size: 14px;
}

.nav-links a:hover {
color: #3b82f6;
}

.container {
width: 90%;
max-width: 1100px;
margin: 40px auto;
}

/* CARD */

.card {
background: rgba(255, 255, 255, 0.05);
border-radius: 14px;
padding: 25px;
margin-bottom: 25px;
transition: 0.3s ease;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card:hover {
transform: translateY(-6px);
}

/* BUTTONS */

.btn {
padding: 8px 16px;
border-radius: 6px;
border: none;
cursor: pointer;
font-weight: 500;
transition: 0.3s ease;
text-decoration: none;
display: inline-block;
}

.btn-success { background: #22c55e; color: white; }
.btn-danger { background: #ef4444; color: white; }
.btn-primary { background: #3b82f6; color: white; }
.btn-secondary { background: #6366f1; color: white; }

.btn:hover {
transform: scale(1.05);
opacity: 0.9;
}

/* BADGES */

.badge {
padding: 6px 14px;
border-radius: 20px;
font-size: 12px;
font-weight: 600;
}

.success { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
.danger { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
.warning { background: #f59e0b; color: black; }
.stopped { background: #6b7280; }

/* PROGRESS */

.progress {
background: rgba(255,255,255,0.1);
border-radius: 20px;
height: 14px;
overflow: hidden;
margin-top: 12px;
}

.progress-bar {
height: 100%;
background: linear-gradient(90deg, #3b82f6, #06b6d4);
transition: width 0.5s ease;
}

/* TABLE */

table {
width: 100%;
border-collapse: collapse;
}

th, td {
padding: 12px;
text-align: left;
}

th {
border-bottom: 1px solid rgba(255,255,255,0.2);
}

tr:hover {
background: rgba(255,255,255,0.05);
}

/* ======================= */
/* PIPELINE STYLES */
/* ======================= */

.pipeline-step{
padding:10px 15px;
border-radius:6px;
background:#334155;
font-size:14px;
}

.pipeline-success{
background:#22c55e;
color:white;
}

</style>

</head>
<body>

<div class="navbar">
<div class="nav-title">🚀 DevOps Dashboard</div>

<div class="nav-links">
{% if current_user.is_authenticated %}
<span style="margin-right:15px;">{{ current_user.username }}</span>
<a href="{{ url_for('main.home') }}">Dashboard</a>
<a href="{{ url_for('main.logout') }}">Logout</a>
{% else %}
<a href="{{ url_for('main.login') }}">Login</a>
<a href="{{ url_for('main.register') }}">Register</a>
{% endif %}
</div>
</div>

<div class="container">
{% block content %}{% endblock %}
</div>

</body>
</html>
